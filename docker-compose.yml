name: percy-site

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-percy_site}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: db-runner
      args:
        DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/percy_site}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/percy_site}
    restart: 'no'

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        APP: web
        DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/percy_site}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/percy_site}
      NUXT_SESSION_SECRET: ${NUXT_SESSION_SECRET:-change-me}
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NUXT_PUBLIC_ADMIN_URL: ${NUXT_PUBLIC_ADMIN_URL:-http://localhost:3001}
      NUXT_UPLOADS_DIR: ${NUXT_UPLOADS_DIR:-/app/storage/uploads}
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - '${WEB_PORT:-3000}:3000'
    volumes:
      - uploads-data:/app/storage/uploads
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        APP: admin
        DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/percy_site}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/percy_site}
      NUXT_SESSION_SECRET: ${NUXT_SESSION_SECRET:-change-me}
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NUXT_PUBLIC_ADMIN_URL: ${NUXT_PUBLIC_ADMIN_URL:-http://localhost:3001}
      NUXT_UPLOADS_DIR: ${NUXT_UPLOADS_DIR:-/app/storage/uploads}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_INITIAL_PASSWORD: ${ADMIN_INITIAL_PASSWORD:-change-me}
      HOST: 0.0.0.0
      PORT: 3000
    ports:
      - '${ADMIN_PORT:-3001}:3000'
    volumes:
      - uploads-data:/app/storage/uploads
    restart: unless-stopped

volumes:
  postgres-data:
  uploads-data:
