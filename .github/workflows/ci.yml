name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@10.18.2 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm db:generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/percy_site

      - name: Run quality checks
        run: pnpm check

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/percy_site
          NUXT_SESSION_SECRET: ci-session-secret
          NUXT_PUBLIC_SITE_URL: http://localhost:3000
          NUXT_PUBLIC_ADMIN_URL: http://localhost:3001
          ADMIN_EMAIL: admin@example.com
          ADMIN_INITIAL_PASSWORD: change-me
